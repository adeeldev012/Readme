name: Generate Professional Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Professional Snake
        uses: Platane/snk@v3
        with:
          github_user_name: adeeldev012
          outputs: |
            # Dark version - Rainbow snake
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#ff6b6b&color_dots=#ff6b6b,#ff9f43,#feca57,#00d2d3,#54a0ff,#5f27cd,#ff6b6b,#ff9f43&animation_interval=30&animation_loop=infinite&snake_length=200&speed=4&trail_length=80
            
            # Light version - Neon snake
            dist/github-snake.svg?palette=github-light&color_snake=#6c5ce7&color_dots=#6c5ce7,#a29bfe,#fd79a8,#fdcb6e,#00cec9,#6c5ce7&animation_interval=30&animation_loop=infinite&snake_length=200&speed=4&trail_length=80

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
          force_orphan: true
          user_name: 'adeeldev012'
          user_email: 'adeeldev012@users.noreply.github.com'
          commit_message: 'Generate professional long snake animation'
