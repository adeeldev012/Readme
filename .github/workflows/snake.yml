name: Generate Snake Game

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: adeeldev012
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00ff00&color_dots=#00ff00,#00cc00,#009900,#006600,#003300
            dist/github-snake.svg?palette=github-light&color_snake=#ff6b6b&color_dots=#ff6b6b,#ee5a24,#d63031,#c0392b,#e74c3c

      - name: Deploy to Output Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
          force_orphan: true
          user_name: 'adeeldev012'
          user_email: 'adeeldev012@users.noreply.github.com'
          commit_message: 'Generate fast snake animation'
